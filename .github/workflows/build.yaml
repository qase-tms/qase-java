name: Java CI

on:
  push:
  pull_request:
    branches:
      - 'main'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
      - name: Maven Verify
        run: mvn -B clean verify

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: junit5
            example-dir: examples/junit5/junit5-maven
            expected-file: expected/junit5-examples.yaml
          - framework: testng
            example-dir: examples/testng/testng-maven
            expected-file: expected/testng-examples.yaml
          - framework: junit4
            example-dir: examples/junit4/junit4-maven
            expected-file: expected/junit4-examples.yaml
          - framework: cucumber7
            example-dir: examples/cucumber7/cucumber7-maven-junit5
            expected-file: expected/cucumber7-examples.yaml
          - framework: cucumber5
            example-dir: examples/cucumber5/cucumber5-maven
            expected-file: expected/cucumber5-examples.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reporters-validator
        run: pip install git+https://github.com/qase-tms/reporters-validator.git

      - name: Download report schemas
        run: git clone --depth 1 https://github.com/qase-tms/specs.git /tmp/specs

      - name: Build project
        run: mvn -B clean install -DskipTests

      - name: Validate ${{ matrix.framework }} reporter
        run: |
          cd ${{ matrix.example-dir }}
          QASE_MODE=report mvn -B test || true

          reporters-validator validate \
            --report-dir ${{ github.workspace }}/${{ matrix.example-dir }}/build/report \
            --expected ${{ github.workspace }}/${{ matrix.expected-file }} \
            --schema-dir /tmp/specs/report/schemas

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: test
    if: startsWith(github.event.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: 'ossrh'
          server-username: OSSRH_USERNAME
          server-password: OSSRH_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: OSSRH_GPG_PASSPHRASE

      - name: Publish to Apache Maven Central
        run: mvn clean deploy -P release
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_CENTRAL_TOKEN: ${{ secrets.OSSRH_PASSWORD }}
          OSSRH_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
